<nav th:fragment="navbar(usuarioNombre, paginaActiva, usuarioRol)"
    style="background: rgba(10,10,20,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(124,58,237,0.15);"
    class="sticky top-0 z-50 w-full">
    <div class="max-w-screen-xl mx-auto px-6 py-3 flex items-center justify-between">

        <!-- Logo -->
        <a href="/" class="flex items-center">
            <img th:src="@{/imagenes/logo2.png}" src="/imagenes/logo.png" alt="LearnDeck"
                style="height: 3.8rem; width: 11rem;">
        </a>

        <!-- Enlaces de navegación -->
        <div class="hidden md:flex items-center gap-8">
            <a href="/dashboard" th:style="${paginaActiva == 'inicio'} ? 'color:var(--violeta-claro);' : 'color:#a1a1aa;'" class="text-sm font-medium hover:text-white transition-colors">Inicio</a>
            <a href="/barajas" th:style="${paginaActiva == 'barajas'} ? 'color:var(--violeta-claro);' : 'color:#a1a1aa;'" class="text-sm font-medium hover:text-white transition-colors">Barajas</a>
            <a href="/estadisticas" th:style="${paginaActiva == 'estadisticas'} ? 'color:var(--violeta-claro);' : 'color:#a1a1aa;'" class="text-sm font-medium hover:text-white transition-colors">Estadísticas</a>
            <a th:if="${usuarioRol == 'ADMIN'}" href="/admin" 
               class="text-sm font-medium px-3 py-1 rounded-full border border-red-500/30 text-red-400 hover:bg-red-500/10 transition-all">
               Admin
            </a>
        </div>

        <!-- Perfil de Usuario Desplegable -->
        <div class="flex items-center">
            <details class="relative group">
                <!-- El "Botón" (es el summary) -->
                <summary class="list-none cursor-pointer">
                    <div style="background: linear-gradient(135deg, var(--violeta), var(--cyan));" 
                         class="px-4 py-2 rounded-xl flex items-center gap-2 text-white text-sm font-bold shadow-lg shadow-indigo-500/20 active:scale-95 transition-transform">
                        <span th:text="${usuarioNombre}">Usuario</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-70 group-open:rotate-180 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </summary>

                <!-- El Menú -->
                <div class="absolute right-0 mt-3 w-48 overflow-hidden rounded-2xl shadow-2xl"
                     style="background: rgba(15, 15, 25, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(124,58,237,0.2);">
                    
                    <a href="/perfil" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-300 hover:bg-violet-600/20 hover:text-white transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Mi perfil
                    </a>

                    <div style="height: 1px; background: linear-gradient(90deg, transparent, rgba(124,58,237,0.3), transparent);"></div>

                    <a href="/logout" class="flex items-center gap-3 px-4 py-3 text-sm text-red-400 hover:bg-red-500/10 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Cerrar sesión
                    </a>
                </div>
            </details>
        </div>

    </div>
</nav>

<style>
    /* Ocultar la flecha por defecto de <summary> en todos los navegadores */
    summary::-webkit-details-marker { display: none; }
    summary { list-style: none; }
    
    /* Efecto de cerrar al hacer click fuera (opcional, requiere que el summary pierda foco) */
    details[open] summary::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        cursor: default;
    }
</style>
