<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/head :: head('LearnDeck')}"></head>

  <body>
    <nav
      th:replace="~{fragments/nav :: navbar(${usuarioNombre}, 'admin', ${usuarioRol})}"
    ></nav>

    <main class="max-w-screen-xl mx-auto px-6 py-10 relative z-10">
      <!-- Cabecera -->
      <div class="mb-10">
        <h1 class="text-3xl font-black text-white">Panel de administración</h1>
        <p class="text-gray-500 text-sm mt-1">
          Gestiona usuarios y barajas de la plataforma.
        </p>
      </div>

      <!-- Mensaje de error si viene de una acción inválida -->
      <div th:if="${param.error}" class="alerta-error mb-6 p-4 rounded-xl">
        Acción no permitida.
      </div>

      <div class="grid lg:grid-cols-2 gap-8">
        <!-- ── TABLA USUARIOS ── -->
        <div class="card p-6">
          <h2 class="text-lg font-black text-white mb-5">Usuarios</h2>

          <div
            th:if="${#lists.isEmpty(usuarios)}"
            class="text-center py-6"
            style="color: #333; font-size: 0.8rem"
          >
            No hay usuarios registrados
          </div>

          <div
            th:each="u : ${usuarios}"
            class="fila-tabla flex items-center justify-between py-3"
          >
            <div>
              <div class="tabla-nombre" th:text="${u.nombre}">Nombre</div>
              <div class="tabla-meta" th:text="${u.email}">email</div>
            </div>

            <div class="flex items-center gap-2">
              <!-- Badge de rol -->
              <span
                th:text="${u.rol}"
                th:class="${u.rol == 'ADMIN'} ? 'badge-admin' : 'badge-user'"
              >
                USER
              </span>

              <!-- Cambiar rol -->
              <form
                th:action="@{/admin/usuarios/{id}/rol(id=${u.id})}"
                method="post"
              >
                <input
                  type="hidden"
                  name="rol"
                  th:value="${u.rol == 'ADMIN'} ? 'USER' : 'ADMIN'"
                />
                <button
                  type="submit"
                  class="btn-rol"
                  th:text="${u.rol == 'ADMIN'} ? 'Quitar admin' : 'Hacer admin'"
                >
                  Hacer admin
                </button>
              </form>

              <!-- Eliminar usuario -->
              <form
                th:action="@{/admin/usuarios/{id}/eliminar(id=${u.id})}"
                method="post"
              >
                <button
                  type="button"
                  data-action="eliminar-admin"
                  th:attr="data-form-action=@{/admin/usuarios/{id}/eliminar(id=${u.id})},
                     data-texto='¿Eliminar al usuario ' + ${u.nombre} + ' y todos sus datos?'"
                  class="btn-eliminar-mini"
                >
                  Eliminar
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- ── TABLA BARAJAS ── -->
        <div class="card p-6">
          <div class="flex items-center justify-between mb-5">
            <h2 class="text-lg font-black text-white">Barajas</h2>

            <!-- Filtro por usuario -->
            <select
              id="filtroUsuario"
              class="input-cp"
              style="max-width: 200px; font-size: 0.78rem"
            >
              <option value="">Todos los usuarios</option>
              <option
                th:each="u : ${usuarios}"
                th:value="${u.id}"
                th:text="${u.nombre} + ' (' + ${u.email} + ')'"
              >
                Usuario
              </option>
            </select>
          </div>

          <!-- Contador de barajas visibles -->
          <div class="texto-contador">
            Mostrando <span id="contadorBarajasAdmin">0</span> barajas
          </div>

          <div
            th:if="${#lists.isEmpty(barajas)}"
            class="text-center py-6"
            style="color: #333; font-size: 0.8rem"
          >
            No hay barajas creadas
          </div>

          <!-- Cada fila tiene data-usuario para que el JS pueda filtrar -->
          <div
            th:each="b : ${barajas}"
            class="baraja-admin-item fila-tabla flex items-center justify-between py-3"
            th:attr="data-usuario-id=${b.usuario.id}"
          >
            <div>
              <div
                class="tabla-nombre"
                th:text="${b.titulo}"
              >
                Título
              </div>
              <div class="tabla-meta">
                <!-- Nombre del propietario destacado -->
                <span
                  class="texto-violeta"
                  th:text="${b.usuario.nombre}"
                  >usuario</span
                >
                <span
                  th:if="${b.categoria != null}"
                  th:text="' · ' + ${b.categoria}"
                ></span>
                <span
                  th:text="' · ' + ${b.tarjetas != null ? #lists.size(b.tarjetas) : 0} + ' tarjetas'"
                ></span>
              </div>
            </div>

            <form
              th:action="@{/admin/barajas/{id}/eliminar(id=${b.id})}"
              method="post"
            >
              <button
                type="button"
                data-action="eliminar-admin"
                th:attr="data-form-action=@{/admin/barajas/{id}/eliminar(id=${b.id})},
                     data-texto='¿Eliminar la baraja ' + ${b.titulo} + ' y todas sus tarjetas?'"
                class="btn-eliminar-mini"
              >
                Eliminar
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <div id="modalEliminarAdmin" class="modal-overlay hidden">
      <div class="modal-box" style="max-width: 420px">
        <div class="p-6 text-center">
          <h3 class="text-white font-black text-lg mb-2">
            ¿Confirmar eliminación?
          </h3>
          <p class="text-gray-500 text-sm mb-6" id="textoConfirmarEliminar">
            Esta acción no se puede deshacer.
          </p>

          <div class="flex gap-3 justify-center">
            <button
              data-action="cancelar-eliminar-admin"
              class="btn-outline btn-sm"
            >
              Cancelar
            </button>
            <!-- Formulario vacío que el JS rellenará -->
            <form id="formEliminarAdmin" method="post">
              <button
                type="submit"
                class="btn-eliminar-confirmar btn-sm"
              >
                Confirmar
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script th:src="@{/js/admin.js}" defer></script>
  </body>
</html>
