<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/head :: head('LearnDeck')}"></head>

  <body>
    <!-- NAVBAR -->
    <nav
      th:replace="~{fragments/nav :: navbar(${usuarioNombre}, 'comunidad', ${usuarioRol})}"
    ></nav>
    <div th:replace="~{fragments/toast :: toast}"></div>

    <!-- ==============================
     CONTENIDO
============================== -->
    <main class="max-w-screen-xl mx-auto px-6 py-10 relative z-10">
      <!-- Cabecera -->
      <div
        class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-10 animado"
      >
        <div>
          <h1 class="text-3xl font-black text-white">
            Barajas de la comunidad
          </h1>
          <p class="text-gray-500 text-sm mt-1">
            Descubre barajas creadas por otros usuarios y añádelas a tu
            colección.
          </p>
        </div>
      </div>

      <!-- Filtros -->
      <div class="flex flex-wrap gap-3 mb-6 animado delay-1">
        <input
          type="text"
          id="filtraNombre"
          placeholder="Buscar por nombre..."
          class="filtro-input"
        />
        <select id="filtroCategoria" class="filtro-select">
          <option value="">Todas las categorías</option>
          <option
            th:each="cat : ${categorias}"
            th:value="${cat}"
            th:text="${cat}"
          >
            Cat
          </option>
        </select>
      </div>

      <!-- Sin barajas -->
      <div
        th:if="${#lists.isEmpty(barajasCompartidas)}"
        class="text-center py-24 animado delay-2"
      >
        <div class="icono-vacio" style="opacity:0.2;">⬡</div>
        <p class="texto-vacio">
          Todavía no hay barajas compartidas por la comunidad.
        </p>
        <p class="texto-vacio-sm">
          Ve a
          <a href="/barajas" style="color: var(--violeta-claro)">Mis barajas</a>
          y comparte las tuyas.
        </p>
      </div>

      <!-- Grid de barajas de la comunidad -->
      <div
        class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 animado delay-2"
        id="gridComunidad"
      >
        <div
          th:each="baraja : ${barajasCompartidas}"
          class="baraja-gestion"
          th:attr="data-titulo=${baraja.titulo}, data-categoria=${baraja.categoria}, data-id=${baraja.id}"
        >
          <div class="baraja-gestion-img">
            <img
              th:src="@{/imagenes/baraja.png}"
              src="/imagenes/baraja.png"
              th:alt="${baraja.titulo}"
            />
        
            <div class="baraja-gestion-acciones">
              <button
                class="accion-btn accion-editar"
                title="Guardar en mi colección"
                data-action="guardar-copia"
                th:attr="data-id=${baraja.id}, data-titulo=${baraja.titulo}"
              >
                <!-- Icono de descarga -->
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16"
                  />
                </svg>
              </button>
            </div>
          </div>

          <!-- Footer (Hereda los estilos de la sección 20 de tu CSS) -->
          <div class="baraja-gestion-footer">
            <div class="baraja-gestion-nombre" th:text="${baraja.titulo}">
              Nombre
            </div>

            <div class="baraja-gestion-meta">
              <span
                th:text="${baraja.tarjetas != null ? #lists.size(baraja.tarjetas) : 0} + ' tarjetas'"
              >
                0 tarjetas
              </span>
              <span
                th:if="${baraja.categoria != null}"
                class="baraja-gestion-cat"
                th:text="${baraja.categoria}"
                >cat</span
              >
            </div>

            <!-- Autor: Estilizado para que encaje sin romper el diseño -->
            <div
              class="texto-autor baraja-count"
            >
              Hecha por
              <span
                class="texto-violeta"
                th:text="${baraja.usuario.nombre.toUpperCase()}"
                >USER</span
              >
            </div>
          </div>
        </div>
      </div>
    </main>

    <script th:src="@{/js/animacion.js}" defer></script>
    <script th:src="@{/js/comunidad.js}" defer></script>
  </body>
</html>
