<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('LearnDeck')}"></head>

<body>
    <div class="contenedor-login">
        <div class="form-card">

            <!-- Logo -->
            <div class="text-center mb-8">
                <h1 class="logo-titulo">
                    <span class="logo-violeta">learn</span><span class="logo-cyan">deck</span>
                </h1>
                <div class="linea mx-auto"></div>
                <p class="text-gray-500 text-sm mt-2">Bienvenido de nuevo. Inicia sesión para continuar.</p>
            </div>

            <!-- Error -->
            <div th:if="${error}" class="alerta-error">
                &gt; <span th:text="${error}"></span>
            </div>

            <!-- Éxito tras registro -->
            <div th:replace="~{fragments/toast :: toast}"></div>

            <!-- Formulario -->
            <form th:action="@{/login}" method="post" class="space-y-5">

                <div>
                    <label for="email" ...>correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tucorreo@gmail.com" required autofocus class="input-cp">
                    <p id="errorEmail" class="text-red-400 text-xs mt-1 hidden">El formato del correo no es válido.</p>
                </div>

                <div>
                    <label for="contrasena" ...>contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required class="input-cp">
                    <p id="errorContrasena" class="text-red-400 text-xs mt-1 hidden">La contraseña debe tener al menos 8 caracteres.</p>
                </div>

                <div class="flex justify-center pt-2">
                    <button onclick="validarLogin()" class="btn-primario"  >
                        Iniciar sesión
                    </button>
                </div>

            </form>

            <!-- Separador -->
            <div
                class="sep-form">
            </div>

            <!-- Link registro -->
            <p class="text-center text-sm text-gray-600">
                ¿No tienes cuenta?
                <a href="/registro" class="enlace-violeta hover:underline">Regístrate gratis</a>
            </p>

        </div>
    </div>
</body>
<!--<script th:src="@{/js/login.js} defer"></script>-->
</html>
