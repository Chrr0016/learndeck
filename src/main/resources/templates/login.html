<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnDeck – Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6d28d9',
                        primaryHover: '#5b21b6',
                        background: '#1e1230',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="background-color: #1e1230;">

<div class="w-full max-w-md bg-white/5 backdrop-blur border border-white/10 rounded-2xl shadow-2xl p-10">

    <!-- Logo -->
    <div class="text-center mb-8">
        <h1 class="text-4xl font-black text-violet-400 tracking-tight">learndeck</h1>
        <p class="text-gray-400 text-sm mt-2">Bienvenido de nuevo. Inicia sesión para continuar.</p>
    </div>

    <!-- Error -->
    <div th:if="${error}"
         class="mb-4 bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3">
        <span th:text="${error}"></span>
    </div>

    <!-- Éxito tras registro -->
    <div th:if="${param.mensaje}"
         class="mb-4 bg-green-500/10 border border-green-500/30 text-green-400 text-sm rounded-lg px-4 py-3">
        Cuenta creada correctamente. Inicia sesión.
    </div>

    <!-- Formulario -->
    <form th:action="@{/login}" method="post" class="space-y-5">

        <!-- Email -->
        <div>
            <label for="email" class="block text-sm font-semibold text-gray-300 mb-1">
                Correo electrónico
            </label>
            <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="tucorreo@email.com"
                    required
                    autofocus
                    class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-lg text-sm text-white
                           placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-violet-500
                           focus:border-transparent transition">
        </div>

        <!-- Contraseña -->
        <div>
            <label for="contrasena" class="block text-sm font-semibold text-gray-300 mb-1">
                Contraseña
            </label>
            <input
                    type="password"
                    id="contrasena"
                    name="contrasena"
                    placeholder="••••••••"
                    required
                    class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-lg text-sm text-white
                           placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-violet-500
                           focus:border-transparent transition">
        </div>

        <!-- Botón -->
        <button
                type="submit"
                class="w-full bg-violet-600 hover:bg-violet-700 text-white font-semibold
                       py-2.5 rounded-lg transition text-sm tracking-wide">
            Iniciar sesión
        </button>

    </form>

    <!-- Link registro -->
    <p class="text-center text-sm text-gray-500 mt-6">
        ¿No tienes cuenta?
        <a href="/registro" class="text-violet-400 font-semibold hover:underline">Regístrate gratis</a>
    </p>

</div>

</body>
</html>
