<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnDeck – Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="contenedor-login">
        <div class="form-card">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="etiqueta mb-2">// acceso al sistema</div>
                <h1 style="font-size: 2rem; font-weight: 900; letter-spacing: -0.5px;">
                    <span style="color: var(--violeta-claro);">learn</span><span style="color: var(--cyan);">deck</span>
                </h1>
                <div class="linea"></div>
                <p class="text-gray-500 text-sm mt-2">Bienvenido de nuevo. Inicia sesión para continuar.</p>
            </div>

            <!-- Error -->
            <div th:if="${error}" class="alerta-error">
                &gt; <span th:text="${error}"></span>
            </div>

            <!-- Éxito tras registro -->
            <div th:if="${param.mensaje}" class="alerta-exito">
                &gt; Cuenta creada correctamente. Inicia sesión.
            </div>

            <!-- Formulario -->
            <form th:action="@{/login}" method="post" class="space-y-5">

                <div>
                    <label for="email"
                        style="display: block; font-size: 0.8rem; font-weight: 600; color: #9ca3af; margin-bottom: 0.4rem; font-family: 'Courier New', monospace; letter-spacing: 0.05em;">
                        correo_electronico
                    </label>
                    <input type="email" id="email" name="email" placeholder="tucorreo@email.com" required autofocus
                        class="input-cp">
                </div>

                <div>
                    <label for="contrasena"
                        style="display: block; font-size: 0.8rem; font-weight: 600; color: #9ca3af; margin-bottom: 0.4rem; font-family: 'Courier New', monospace; letter-spacing: 0.05em;">
                        contraseña
                    </label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required
                        class="input-cp">
                </div>

                <button type="submit" class="btn-primario">
                    Iniciar sesión
                </button>

            </form>

            <!-- Separador -->
            <div
                style="height: 1px; background: linear-gradient(to right, transparent, rgba(124,58,237,0.2), transparent); margin: 1.5rem 0;">
            </div>

            <!-- Link registro -->
            <p class="text-center text-sm text-gray-600">
                ¿No tienes cuenta?
                <a href="/registro" style="color: var(--violeta-claro); font-weight: 600;"
                    class="hover:underline">Regístrate gratis</a>
            </p>

        </div>
    </div>
</body>

</html>
