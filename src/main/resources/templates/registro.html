<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('LearnDeck')}"></head>

<body>
    <div class="contenedor-login">
        <div class="form-card">

            <!-- Logo -->
            <div class="text-center mb-8">
                <h1 style="font-size: 2rem; font-weight: 900; letter-spacing: -0.5px;">
                    <span style="color: var(--violeta-claro);">learn</span><span style="color: var(--cyan);">deck</span>
                </h1>
                <div class="linea mx-auto" ></div>
                <p class="text-gray-500 text-sm mt-2">Crea tu cuenta gratuita y empieza a estudiar.</p>
            </div>

            <!-- Error -->
            <div th:if="${error}" class="alerta-error">
                &gt; <span th:text="${error}"></span>
            </div>

            <!-- Formulario -->
            <form th:action="@{/registro}" method="post" class="space-y-5">

                <div>
                    <label for="nombre"
                        style="display: block; font-size: 0.8rem; font-weight: 600; color: #9ca3af; margin-bottom: 0.4rem;">
                        nombre
                    </label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required autofocus
                        class="input-cp">
                </div>

                <div>
                    <label for="email" ...>correo electronico</label>
                    <input type="email" id="email" name="email" placeholder="tucorreo@gmail.com" required class="input-cp">
                    <p id="errorEmail" class="text-red-400 text-xs mt-1 hidden">El formato del correo no es válido.</p>
                </div>

                <div>
                    <label for="contrasena" ...>contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required class="input-cp">
                    <p id="errorContrasena" class="text-red-400 text-xs mt-1 hidden">Mínimo 8 caracteres, una mayúscula y un número.</p>
                </div>
                <div>
                    <label for="confirmar"
                           style="display: block; font-size: 0.8rem; font-weight: 600; color: #9ca3af; margin-bottom: 0.4rem;">
                        confirmar contraseña
                    </label>
                    <input type="password" id="confirmar" name="confirmar" placeholder="••••••••" required
                           class="input-cp">
                    <p id="errorConfirmar" class="text-red-400 text-xs mt-1 hidden">Las contraseñas no coinciden.</p>

                </div>
                <div class="flex justify-center pt-2">
                    <button type="button" onclick="validarRegistro()" class="btn-primario">
                        Crear cuenta
                    </button>
                </div>

            </form>

            <!-- Separador -->
            <div
                style="height: 1px; background: linear-gradient(to right, transparent, rgba(124,58,237,0.2), transparent); margin: 1.5rem 0;">
            </div>

            <!-- Link login -->
            <p class="text-center text-sm text-gray-600">
                ¿Ya tienes cuenta?
                <a href="/login" style="color: var(--violeta-claro); font-weight: 600;" class="hover:underline">Inicia
                    sesión</a>
            </p>
        </div>
    </div>
</body>

<script th:src="@{/js/registro.js}" defer></script>

</html>
